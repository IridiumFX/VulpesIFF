name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Desktop platforms (build + test) ─────────────────────────────────
  linux-gcc:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          cmake -B build -DCMAKE_C_COMPILER=gcc-13 -DCMAKE_BUILD_TYPE=Debug
          cmake --build build --target VulpesIFF_Tests
      - name: Test
        run: build/Tests/VulpesIFF_Tests

  linux-clang:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          cmake -B build -DCMAKE_C_COMPILER=clang-18 -DCMAKE_BUILD_TYPE=Debug
          cmake --build build --target VulpesIFF_Tests
      - name: Test
        run: build/Tests/VulpesIFF_Tests

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          cmake --build build --target VulpesIFF_Tests
      - name: Test
        run: build/Tests/VulpesIFF_Tests

  windows-mingw:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-cmake mingw-w64-ucrt-x86_64-ninja
      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
          cmake --build build --target VulpesIFF_Tests
      - name: Test
        run: build/Tests/VulpesIFF_Tests.exe

  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          cmake -B build -DCMAKE_C_STANDARD=17 -DCMAKE_BUILD_TYPE=Debug
          cmake --build build --target VulpesIFF_Tests --config Debug
      - name: Test
        run: build\Tests\Debug\VulpesIFF_Tests.exe

  freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build and Test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y cmake ninja
          run: |
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
            cmake --build build --target VulpesIFF_Tests
            build/Tests/VulpesIFF_Tests

  # ── Cross-compile targets (build only, no test) ──────────────────────
  ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build (arm64, cross-compile)
        run: |
          cmake -B build \
            -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0
          cmake --build build --target VulpesIFF --config Debug -- -quiet

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build (arm64-v8a, cross-compile)
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Debug
          cmake --build build --target VulpesIFF
